{% extends "base.html" %}

{% block content %}
<div class="glass text-center fade-in hover-glow" style="max-width: 800px; margin: 3rem auto; padding: 4rem 2rem;">
    <h1 class="text-gradient" style="font-size: 3rem;">Match Finished!</h1>
    
    <div class="level-up-banner mt-4" style="background: rgba(0,0,0,0.3); border-color: var(--glass-border); color: var(--text-muted); animation: none; padding: 2.5rem; justify-content: center; gap: 15px;">
        <i class="ph-bold ph-spinner-gap" style="font-size: 3rem; animation: spin 1.5s linear infinite; color: var(--primary);"></i>
        <div>
            <p style="font-size: 1.2rem; font-weight: 600; color: var(--text-main); margin-bottom: 0.5rem;">You've submitted your answers!</p>
            <p class="text-muted" style="margin-bottom: 0;">Waiting for the other players to finish...</p>
        </div>
    </div>

    <p class="text-muted mt-4">This page will show the final scores once everyone is done.</p>
    
    <div class="mt-4">
        <a href="{{ url_for('main.dashboard') }}" class="btn btn-glass" style="padding: 1rem 2rem; border-radius: 999px;">Return to Dashboard</a>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<style>
@keyframes spin { 100% { transform: rotate(360deg); } }
</style>
{% endblock %}
